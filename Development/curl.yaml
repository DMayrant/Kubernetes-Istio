apiVersion: v1
kind: Pod
metadata:
  labels:
    run: curl
  name: curl
  namespace: dev
spec:
  containers:
    - image: curlimages/curl:7.83.0
      name: curl
      command: ["bin/sh", "-c"]
      args:
        - |
          while true; do 
            curl -I http://nginx-web.dev.svc.cluster.local:80;
            sleep 1;
          done
      resources:
        limits:
          memory: 100Mi
        requests:
          memory: 50Mi
          cpu: 75m
  dnsPolicy: ClusterFirst
  restartPolicy: Always
